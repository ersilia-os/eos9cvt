Status: Ready
Title: Permeability and Efflux Prediction (GNN-MTL)
Description: 'Predicts cell membrane permeability and efflux transport using a multitask   graph
  neural network. The model simultaneously predicts four endpoints:   Caco-2 efflux
  ratio (ER), Caco-2 apparent permeability (P_app), MDCK ER, and NIH-MDCK ER. Built
  with Chemprop v2.1 using a message-passing neural   network (MPNN) trained on a
  harmonized single-laboratory dataset of over   10, 000 compounds from Caco-2 and
  MDCK cell-line assays.'
